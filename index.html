<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Some Stories Are Worth Telling</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:white;
font-family:Inter,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.container{
max-width:700px;
padding:30px;
animation:fade 2s ease;
}

h1{
font-family:Cinzel,serif;
font-size:3rem;
letter-spacing:4px;
margin-bottom:20px;
}

.subtitle{
color:#bfbfbf;
margin-bottom:8px;
}

.small{
color:#8d8d8d;
margin-top:15px;
font-size:.9rem;
}

.quote{
margin:35px 0;
font-style:italic;
color:#d6d6d6;
}

button{
padding:16px 42px;
background:transparent;
color:white;
border:1px solid white;
font-size:1rem;
cursor:pointer;
transition:.4s;
border-radius:40px;
}

button:hover{
background:white;
color:black;
transform:scale(1.05);
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>SOME STORIES<br>ARE WORTH TELLING</h1>

<p class="subtitle">A Film by Adrian</p>

<p class="subtitle">2026 • 10 Minutes</p>

<p class="small">Documentary • Romance</p>

<p class="quote">

"Some stories aren't written.<br>
They're lived."

</p>

<p class="small">

Made for one person.

</p>

<br><br>

<button>

▶ PLAY

</button>

</div>

</body>

</html>
